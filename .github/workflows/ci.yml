name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  cli:
    name: CLI (bash) tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats and bc
        run: sudo apt-get update && sudo apt-get install -y bats bc

      - name: Shellcheck wg-forge scripts
        run: |
          sudo apt-get install -y shellcheck
          # --severity=error catches genuine bugs without failing on the
          # codebase's existing style-level warnings. Tighten over time.
          shellcheck --severity=error wg-forge wg-forge-tracker install.sh

      - name: Run bats tests
        run: bats test/

  web:
    name: Web (TypeScript) tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Run tests
        run: npm test
